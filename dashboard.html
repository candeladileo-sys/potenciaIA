<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotenciaIA · Dashboard HR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap');
:root {
  --verde: #1d4e3f; --vm: #27ae60; --vl: #e8f5ee; --vs: #c8e6d4;
  --azul: #1a5fa8; --al: #e8f0fb; --as: #b8d1ed;
  --bg: #f7f9fc; --sf: #ffffff; --bd: #e8edf3;
  --text: #111827; --td: #4b5563; --tm: #9ca3af;
  --y: #f59e0b; --yl: #fef3c7; --r: #dc2626; --rl: #fee2e2;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
.topbar { background: var(--sf); border-bottom: 1px solid var(--bd); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.02); }
.logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; color: white; }
.logo-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--verde); }
.hr-badge { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--verde); background: var(--verde-light); border: 1px solid var(--vs); padding: 4px 10px; border-radius: 20px; }
.view { display: none; } .view.active { display: block; }
.main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 10px; padding: 18px 20px; }
.stat-label { font-size: 11px; color: var(--tm); font-weight: 600; text-transform: uppercase; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--verde); }
.table-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #f9fafb; }
th { text-align: left; padding: 12px 20px; font-size: 11px; color: var(--tm); text-transform: uppercase; }
tbody tr { border-top: 1px solid var(--bd); cursor: pointer; }
tbody tr:hover { background: var(--vl); }
td { padding: 14px 20px; font-size: 13px; color: var(--td); }
.ep { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid transparent; }
.e1 { background: #fef9e7; color: #78530a; border-color: #f5d87a; }
.e2 { background: var(--al); color: #0d3d70; border-color: var(--as); }
.e3 { background: var(--vl); color: var(--vm); border-color: var(--vs); }
.e4 { background: #f3eeff; color: #4a2080; border-color: #c4a0f0; }
.pend { background: #f3f4f6; color: #6b7280; border-color: #d1d5db; }
.err { background: var(--rl); color: var(--r); border-color: #fca5a5; }
.fd { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.sm { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 14px 0; }
.sm-c { border-radius: 10px; padding: 16px; border: 1.5px solid var(--bd); opacity: .35; }
.sm-c.active { opacity: 1; }
.sm-e.active { background: var(--vl); border-color: var(--vs); }
.sm-s.active { background: var(--yl); border-color: #fcd34d; }
.sm-b.active { background: var(--rl); border-color: #fca5a5; }
.ci { background: var(--sf); border-left: 3px solid var(--vm); padding: 16px; margin-bottom: 12px; border-top: 1px solid var(--bd); border-bottom: 1px solid var(--bd); }
.wo { display: none; position: fixed; inset: 0; background: rgba(17,24,39,0.4); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.wo.active { display: flex; }
.wb { background: var(--sf); border-radius: 16px; max-width: 520px; width: 100%; padding: 28px; }
.in { width: 100%; background: var(--bg); border: 1.5px solid var(--bd); border-radius: 8px; padding: 10px; margin-top: 6px; outline: none; }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="Dashboard.init()">
    <div class="logo-icon">P</div><span class="logo-name">PotenciaIA</span>
  </div>
  <div><span class="hr-badge">Panel HR</span></div>
</div>

<div class="view active" id="v_dash">
  <div class="main">
    <div class="page-header">
      <h2 class="page-title">Monitor de Búsquedas Activas</h2>
      <button style="padding:9px 20px; background:var(--verde); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;" onclick="$('wizard').classList.add('active')">+ Enviar Invitación</button>
    </div>
    
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Procesos Totales</div><div class="stat-value" id="m1">0</div></div>
      <div class="stat-card"><div class="stat-label">CPA Promedio</div><div class="stat-value" id="m2">0.0</div></div>
      <div class="stat-card"><div class="stat-label">Confianza Promedio</div><div class="stat-value" id="m3">0%</div></div>
      <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value" style="color:var(--azul)" id="m4">0</div></div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr><th>Candidato</th><th>Puesto Destino</th><th>Estrato Requerido</th><th>CPA Detectada</th><th>Ajuste (Fit)</th></tr>
        </thead>
        <tbody id="tabla_body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="view" id="v_rep"><div class="main" id="report_content"></div></div>

<div class="wo" id="wizard">
  <div class="wb">
    <h3 class="page-title">Configurar Nuevo Proceso</h3>
    <input type="text" id="w_nombre" placeholder="Nombre completo del candidato" class="in">
    <input type="text" id="w_puesto" placeholder="Posición (ej. Gerente de Planta)" class="in">
    <select id="w_estrato" class="in" style="background:white;">
      <option value="Estrato I">Estrato I (Operario / Supervisor)</option>
      <option value="Estrato II">Estrato II (Especialista / Jefe de Línea)</option>
      <option value="Estrato III">Estrato III (Gerente Pleno / Funcional)</option>
      <option value="Estrato IV">Estrato IV (Gerente General / Director)</option>
    </select>
    <div style="display:flex; justify-content:end; gap:10px; margin-top:24px;">
      <button onclick="$('wizard').classList.remove('active')" style="padding:8px 16px; background:none; border:1px solid var(--bd); border-radius:6px; cursor:pointer;">Cancelar</button>
      <button onclick="Dashboard.crearInvitacion()" style="padding:9px 20px; background:var(--verde); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Generar e Inyectar a Firebase</button>
    </div>
  </div>
</div>

<script>
const $=i=>document.getElementById(i);

// ── REEMPLAZÁ CON TUS CREDENCIALES REALES DE FIREBASE REALTIME DATABASE ──
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROJECT_ID.firebaseapp.com",
  databaseURL: "https://TU_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_PROJECT_ID.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const UI = {
  pill: e => {
    if(e === 'Pendiente') return `<span class="ep pend">PENDIENTE</span>`;
    if(e === 'Error Red') return `<span class="ep err">ERR_CORS</span>`;
    const n = e.match(/\d+/) ? e.match(/\d+/)[0] : '1';
    return `<span class="ep e${n}">Estrato ${n}</span>`;
  },
  sem: f => `
    <div class="sm">
      <div class="sm-c sm-e ${f==='encaja'?'active':''}">🟢 <b>ENCAJA</b></div>
      <div class="sm-c sm-s ${f==='supera'?'active':''}">🟡 <b>SUPERA</b></div>
      <div class="sm-c sm-b ${f==='brecha'?'active':''}">🔴 <b>BRECHA</b></div>
    </div>`
};

const Dashboard = {
  evs: [],
  init() {
    $('v_rep').classList.remove('active'); $('v_dash').classList.add('active');
    
    // Escucha permanente en tiempo real de la base de datos
    db.ref('potencia_evals').on('value', (snapshot) => {
      const data = snapshot.val();
      this.evs = [];
      if (data) {
        Object.keys(data).forEach(key => {
          this.evs.push({ idFirebase: key, ...data[key] });
        });
      }
      this.calc(); this.render();
    });
  },

  calc() {
    $('m1').textContent = this.evs.length;
    let s = 0, f = 0, c = 0, confAcum = 0, p = 0;
    this.evs.forEach(e => {
      if(e.estado === 'listo') {
        const num = e.cpa.match(/\d+/) ? parseInt(e.cpa.match(/\d+/)[0]) : 1;
        s += num; c++;
        confAcum += e.confianza || 0;
        if(e.fit === 'encaja') f++;
      } else { p++; }
    });
    $('m2').textContent = c ? (s / c).toFixed(1) : '0.0';
    $('m3').textContent = c ? Math.round((confAcum / c)) + '%' : '0%';
    $('m4').textContent = p;
  },

  render() {
    $('tabla_body').innerHTML = this.evs.map((e,i) => `
      <tr onclick="Dashboard.verInforme(${i})">
        <td><b>${e.nombre}</b></td>
        <td>${e.puesto}</td>
        <td>${e.requerido}</td>
        <td>${UI.pill(e.cpa)}</td>
        <td><span class="fd" style="background:${e.fit==='encaja'?'var(--vm)':e.fit==='supera'?'var(--y)':e.fit==='brecha'?'var(--r)':'#9ca3af'}"></span>${e.fit.toUpperCase()}</td>
      </tr>
    `).join('');
  },

  verInforme(i) {
    const e = this.evs[i];
    if(e.estado === 'pendiente') {
      alert(`Invitación activa en la nube. URL oficial para el candidato:\nagente_potenciaIA.html?candidato=${encodeURIComponent(e.nombre)}`);
      return;
    }
    $('v_dash').classList.remove('active'); $('v_rep').classList.add('active');
    
    let bannerError = "";
    if(e.estado === 'error_red') {
      bannerError = `
        <div style="background:var(--rl); border:1px solid #fca5a5; padding:16px; border-radius:8px; margin-bottom:20px; font-size:13px; color:var(--r); line-height:1.5;">
          🚨 <b>Alerta de Enlace Analítico (CORS):</b> El audio se grabó pero las políticas del navegador bloquearon el envío directo a Claude. La transcripción cruda se preservó abajo.
        </div>
      `;
    }

    const decisionTitulo = e.rec?.decision === 'avanzar' ? '✓ Avanzar en el proceso' : e.rec?.decision === 'avanzar_con_desarrollo' ? '◐ Avanzar con plan de desarrollo' : '✕ No avanzar para este rol';

    $('report_content').innerHTML = `
      <span style="cursor:pointer; color:var(--tm); font-size:13px;" onclick="Dashboard.init()">← Volver al Dashboard</span>
      <h1 style="font-family:'Syne',sans-serif; font-size:28px; margin-top:12px;">${e.nombre}</h1>
      <p style="color:var(--tm); font-size:13px; margin-bottom:24px;">${e.puesto} · ID: ${e.id}</p>
      
      ${bannerError}

      <div style="margin-bottom:24px;">
        <h3>Ajuste Organizacional (SST)</h3>
        ${UI.sem(e.fit)}
        <p style="background:var(--vl); padding:14px; border-left:4px solid var(--vm); font-size:14px; border-radius:6px; margin-top:12px;"><b>Diagnóstico:</b> ${e.fraseEjecutiva}</p>
      </div>

      <div style="margin-bottom:24px;">
        <h3>Mapeo de Capacidad Intelectual</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:12px;">
          <div style="background:var(--vl); padding:20px; border-radius:10px; text-align:center;"><h5>Detectada (CPA)</h5><h2>${e.cpa}</h2></div>
          <div style="background:white; border:1px solid var(--bd); padding:20px; border-radius:10px; text-align:center;"><h5>Requerida por el Puesto</h5><h2>${e.requerido}</h2></div>
        </div>
      </div>

      <div style="margin-bottom:24px;">
        <h3>Citas Textuales Extraídas (Protocolo Blaistein)</h3>
        ${e.evidencias && e.evidencias.length ? e.evidencias.map(v => `<div class="ci"><p style="font-style:italic; font-size:14px;">"${v.texto}"</p><span style="font-size:11px; background:var(--vl); color:var(--vm); padding:2px 8px; border-radius:10px; font-weight:600; display:inline-block; margin-top:8px;">${v.indicador}</span></div>`).join('') : '<p style="font-size:13px; color:var(--tm);">Sin evidencias estructuradas por error de red.</p>'}
      </div>

      <div style="margin-bottom:24px;">
        <h3>Línea de Acción Recomendada</h3>
        <div style="background:white; border:1px solid var(--bd); padding:16px; border-radius:8px; font-size:14px; margin-top:8px; color:var(--td);">
          <strong style="display:block; margin-bottom:4px; color:var(--vm);">${decisionTitulo}</strong>
          ${e.rec?.texto || ''}
        </div>
      </div>

      <div>
        <h3>Transcripción Completa Guardada en Buffer</h3>
        <textarea style="width:100%; height:150px; margin-top:8px; padding:12px; border:1px solid var(--bd); border-radius:8px; font-size:13px; font-family:monospace; background:var(--bg); color:var(--td);" readonly>${e.transcripcionCompleta || 'Sin texto registrado.'}</textarea>
      </div>
    `;
  },

  crearInvitacion() {
    const n = $('w_nombre').value.trim(), p = $('w_puesto').value.trim(), estrato = $('w_estrato').value;
    if(!n || !p) return alert('Por favor, complete todos los campos.');
    
    this.evs = this.evs.filter(e => e.nombre.toLowerCase().trim() !== n.toLowerCase().trim());
    const nuevoId = 'EV-' + Date.now().toString().slice(-3);
    
    // Guardado directo en la nube de Firebase Realtime
    db.ref('potencia_evals/' + nuevoId).set({
      id: nuevoId, nombre: n, puesto: p, requerido: estrato,
      cpa: 'Pendiente', estado: 'pendiente', fit: '-', fraseEjecutiva: 'En espera.', evidencias: [], rec: { decision: 'no_avanzar', texto: 'En espera.' }, confianza: 0, transcripcionCompleta: ''
    });

    alert(`Invitación inyectada a Firebase para: ${n}\nLink del postulante:\nagente_potenciaIA.html?candidato=${encodeURIComponent(n)}`);
    $('wizard').classList.remove('active');
  }
};
window.onload = () => Dashboard.init();
</script>
</body>
</html>
